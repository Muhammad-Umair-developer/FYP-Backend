<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition Attendance - Admin Dashboard v2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .nav-tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #ddd;
            flex-wrap: wrap;
        }
        
        .nav-tab {
            flex: 1;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            border: none;
            background: none;
            font-size: 1em;
            transition: all 0.3s;
            min-width: 150px;
        }
        
        .nav-tab.active {
            background: white;
            border-bottom: 3px solid #667eea;
            color: #667eea;
            font-weight: bold;
        }
        
        .nav-tab:hover {
            background: white;
        }
        
        .content {
            padding: 30px;
        }
        
        .tab-content {
            display: none;
            animation: fadeIn 0.3s;
        }
        
        .tab-content.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: transform 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button.secondary {
            background: #6c757d;
        }
        
        button.danger {
            background: #dc3545;
        }
        
        button.success {
            background: #28a745;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .card:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        table th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
        }
        
        table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        table tr:hover {
            background: #f5f5f5;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .status-present { background: #d4edda; color: #155724; }
        .status-absent { background: #f8d7da; color: #721c24; }
        .status-leave { background: #d1ecf1; color: #0c5460; }
        .status-late { background: #fff3cd; color: #856404; }
        
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        
        video {
            width: 100%;
            max-width: 640px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Attendance System v2.0</h1>
            <p>Production-Ready Face Recognition Backend</p>
            <p id="status">Not connected</p>
        </header>
        
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('auth')">🔐 Auth</button>
            <button class="nav-tab" onclick="showTab('students')">👥 Students</button>
            <button class="nav-tab" onclick="showTab('attendance')">📝 Attendance</button>
            <button class="nav-tab" onclick="showTab('webcam')">📹 Live Camera</button>
            <button class="nav-tab" onclick="showTab('reports')">📊 Reports</button>
            <button class="nav-tab" onclick="showTab('embeddings')">🧠 Embeddings</button>
        </div>
        
        <div class="content">
            <!-- Authentication Tab -->
            <div id="auth" class="tab-content active">
                <h2>Authentication</h2>
                <div class="form-group">
                    <label>Email</label>
                    <input id="email" type="email" value="admin@fyp.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input id="password" type="password" value="admin123">
                </div>
                <button onclick="login()">Login</button>
                <div id="authResult"></div>
            </div>
            
            <!-- Students Tab -->
            <div id="students" class="tab-content">
                <h2>Student Management</h2>
                <div class="form-group">
                    <label>Student ID</label>
                    <input id="studentId" placeholder="e.g., 22-NTU-CS-1192">
                </div>
                <div class="form-group">
                    <label>Name</label>
                    <input id="studentName" placeholder="Student Name">
                </div>
                <div class="form-group">
                    <label>Face Image</label>
                    <input id="studentImage" type="file" accept="image/*">
                </div>
                <button onclick="registerStudent()">Register with Image</button>
                <button onclick="listStudents()">List All Students</button>
                <div id="studentsResult"></div>
            </div>
            
            <!-- Attendance Tab -->
            <div id="attendance" class="tab-content">
                <h2>Attendance Management</h2>
                <div class="form-group">
                    <label>Student ID</label>
                    <input id="attStudentId" placeholder="Student ID">
                </div>
                <div class="form-group">
                    <label>Upload Image to Mark Attendance</label>
                    <input id="attendanceImage" type="file" accept="image/*">
                </div>
                <button onclick="markFromImage()">Mark from Image</button>
                <button onclick="getTodayStats()">Today's Statistics</button>
                <div id="attendanceResult"></div>
            </div>
            
            <!-- Webcam Tab -->
            <div id="webcam" class="tab-content">
                <h2>Live Camera Attendance</h2>
                <p>⚠️ WebSocket camera feature - client implementation needed</p>
                <button onclick="startWebcamSession()">Start Live Session</button>
                <div id="webcamResult"></div>
            </div>
            
            <!-- Reports Tab -->
            <div id="reports" class="tab-content">
                <h2>Attendance Reports</h2>
                <div class="form-group">
                    <label>Start Date</label>
                    <input id="reportStart" type="date">
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input id="reportEnd" type="date">
                </div>
                <button onclick="getDailyReport()">Daily Report (Today)</button>
                <button onclick="getRangeReport()">Range Report</button>
                <button onclick="getStudentSummary()">Student Summary</button>
                <div id="reportsResult"></div>
            </div>
            
            <!-- Embeddings Tab -->
            <div id="embeddings" class="tab-content">
                <h2>Embeddings Management</h2>
                <button onclick="getEmbeddingsInfo()">Info</button>
                <button onclick="validateEmbeddings()">Validate</button>
                <button onclick="backupEmbeddings()">Backup</button>
                <button onclick="retrainEmbeddings()">Retrain (Generate from MongoDB)</button>
                <button onclick="listBackups()">List Backups</button>
                <div id="embeddingsResult"></div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8000/api/v1';
        let token = localStorage.getItem('token');
        
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }
        
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                
                const data = await res.json();
                token = data.access_token;
                localStorage.setItem('token', token);
                
                document.getElementById('authResult').innerHTML = 
                    `<div class="alert alert-success">✓ Login successful! Token: ${token.substring(0, 50)}...</div>`;
                document.getElementById('status').textContent = 'Connected ✓';
                
            } catch (err) {
                document.getElementById('authResult').innerHTML = 
                    `<div class="alert alert-error">✗ Error: ${err.message}</div>`;
            }
        }
        
        async function registerStudent() {
            const studentId = document.getElementById('studentId').value;
            const studentName = document.getElementById('studentName').value;
            const image = document.getElementById('studentImage').files[0];
            
            if (!studentId || !studentName || !image) {
                alert('All fields required');
                return;
            }
            
            const formData = new FormData();
            formData.append('student_id', studentId);
            formData.append('name', studentName);
            formData.append('file', image);
            
            try {
                const res = await fetch(`${API_URL}/students/with-image`, {
                    method: 'POST',
                    headers: {'Authorization': `Bearer ${token}`},
                    body: formData
                });
                const data = await res.json();
                document.getElementById('studentsResult').innerHTML = 
                    `<div class="alert alert-success">${data.message}</div>`;
            } catch (err) {
                document.getElementById('studentsResult').innerHTML = 
                    `<div class="alert alert-error">Error: ${err.message}</div>`;
            }
        }
        
        async function listStudents() {
            try {
                const res = await fetch(`${API_URL}/students?limit=50`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const data = await res.json();
                
                let html = `<p>Total: ${data.total} students</p><table>
                    <tr><th>Student ID</th><th>Name</th><th>Created At</th></tr>`;
                
                data.students.forEach(s => {
                    html += `<tr><td>${s.student_id}</td><td>${s.name}</td><td>${new Date(s.created_at).toLocaleDateString()}</td></tr>`;
                });
                
                html += '</table>';
                document.getElementById('studentsResult').innerHTML = html;
            } catch (err) {
                document.getElementById('studentsResult').innerHTML = 
                    `<div class="alert alert-error">Error: ${err.message}</div>`;
            }
        }
        
        async function markFromImage() {
            const image = document.getElementById('attendanceImage').files[0];
            
            if (!image) {
                alert('Select an image');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', image);
            
            try {
                const res = await fetch(`${API_URL}/attendance/mark-from-image`, {
                    method: 'POST',
                    headers: {'Authorization': `Bearer ${token}`},
                    body: formData
                });
                const data = await res.json();
                
                let html = `<div class="alert alert-success">
                    ${data.message}<br>
                    Marked: ${data.marked} | Unknown: ${data.unknown_faces}
                </div>`;
                
                if (data.matches) {
                    html += '<h3>Matches:</h3><ul>';
                    data.matches.forEach(m => {
                        html += `<li>${m.name} - ${m.status} (${m.confidence.toFixed(2)})</li>`;
                    });
                    html += '</ul>';
                }
                
                document.getElementById('attendanceResult').innerHTML = html;
            } catch (err) {
                document.getElementById('attendanceResult').innerHTML = 
                    `<div class="alert alert-error">Error: ${err.message}</div>`;
            }
        }
        
        async function getDailyReport() {
            try {
                const res = await fetch(`${API_URL}/attendance/report/daily`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const data = await res.json();
                
                let html = `<h3>${data.date}</h3><p>Total Marked: ${data.total_marked}</p>
                    <table><tr><th>Student ID</th><th>Name</th><th>Status</th><th>Time</th></tr>`;
                
                data.records.forEach(r => {
                    html += `<tr><td>${r.student_id}</td><td>${r.name}</td>
                        <td><span class="status-badge status-${r.status.toLowerCase()}">${r.status}</span></td>
                        <td>${new Date(r.date).toLocaleTimeString()}</td></tr>`;
                });
                
                html += '</table>';
                document.getElementById('reportsResult').innerHTML = html;
            } catch (err) {
                document.getElementById('reportsResult').innerHTML = 
                    `<div class="alert alert-error">Error: ${err.message}</div>`;
            }
        }
        
        async function getTodayStats() {
            try {
                const res = await fetch(`${API_URL}/attendance/stats/today`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const data = await res.json();
                
                let html = `<div class="stats">
                    <div class="stat-box">
                        <div class="stat-number">${data.present}</div>
                        <div class="stat-label">Present</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${data.absent}</div>
                        <div class="stat-label">Absent</div>
                    </div>
                </div>`;
                
                document.getElementById('attendanceResult').innerHTML = html;
            } catch (err) {
                document.getElementById('attendanceResult').innerHTML = 
                    `<div class="alert alert-error">Error: ${err.message}</div>`;
            }
        }
        
        async function retrainEmbeddings() {
            try {
                const res = await fetch(`${API_URL}/embeddings/retrain`, {
                    method: 'POST',
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const data = await res.json();
                
                document.getElementById('embeddingsResult').innerHTML = 
                    `<div class="alert alert-success">
                    ${data.message}<br>
                    Trained: ${data.total_trained} | Failed: ${data.failed}
                    </div>`;
            } catch (err) {
                document.getElementById('embeddingsResult').innerHTML = 
                    `<div class="alert alert-error">Error: ${err.message}</div>`;
            }
        }
        
        async function getEmbeddingsInfo() {
            try {
                const res = await fetch(`${API_URL}/embeddings/info`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const data = await res.json();
                
                let html = `<div class="card">
                    <h3>${data.status}</h3>
                    <p>File: ${data.file_path}</p>
                    <p>Size: ${data.file_size_mb} MB</p>
                    <p>Students: ${data.total_students}</p>
                    <p>Dimension: ${data.embedding_dimension}</p>
                    </div>`;
                
                document.getElementById('embeddingsResult').innerHTML = html;
            } catch (err) {
                document.getElementById('embeddingsResult').innerHTML = 
                    `<div class="alert alert-error">Error: ${err.message}</div>`;
            }
        }
        
        // Initialize
        if (token) {
            document.getElementById('status').textContent = 'Connected ✓';
        }
    </script>
</body>
</html>
